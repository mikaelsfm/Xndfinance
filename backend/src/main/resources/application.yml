server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/xndfinance
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

jwt:
  secret: my-secret-key-xnd-finance
  expiration: 86400000